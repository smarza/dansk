<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Studio · Dansk</title>
  <style>
    :root {
      --bg1: #23154f;
      --bg2: #40249b;
      --panel: rgba(255, 255, 255, .13);
      --text: #fff;
      --muted: rgba(255, 255, 255, .78);
      --shadow: 0 18px 45px rgba(0, 0, 0, .28);
      --radius: 24px;
      --accent: #7ee8c8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1d1240;
      color: var(--text);
    }

    body {
      min-height: 100svh;
      background:
        radial-gradient(circle at 20% 8%, #805cff 0 18%, transparent 36%),
        radial-gradient(circle at 85% 18%, #00c2ff 0 11%, transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: clamp(20px, 4vw, 40px) clamp(16px, 3vw, 24px);
    }

    header {
      margin-bottom: clamp(28px, 5vw, 48px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #246b61, var(--accent));
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      font-size: 24px;
      flex: 0 0 auto;
    }

    h1 {
      font-size: clamp(1.6rem, 4.5vw, 2.6rem);
      line-height: 1.1;
      margin: 0;
      letter-spacing: .2px;
    }

    .subtitle {
      font-size: clamp(.95rem, 2.2vw, 1.05rem);
      color: var(--muted);
      margin: 6px 0 0;
      max-width: 48ch;
    }

    .section-title {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      font-weight: 800;
      margin: 0 0 16px;
    }

    .section + .section {
      margin-top: clamp(32px, 5vw, 48px);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: clamp(16px, 3vw, 24px);
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .card-link {
      display: flex;
      flex-direction: column;
      height: 100%;
      text-decoration: none;
      color: inherit;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .card-link:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, .32);
      box-shadow: 0 22px 50px rgba(0, 0, 0, .32);
    }

    .card-link:active {
      transform: translateY(-1px);
    }

    .card-icon {
      display: grid;
      place-items: center;
      height: 120px;
      font-size: 3.2rem;
      background: linear-gradient(135deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .04));
      border-bottom: 1px solid rgba(255, 255, 255, .1);
    }

    .card-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 20px 22px 22px;
      gap: 8px;
    }

    .card-tag {
      align-self: flex-start;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 800;
      color: var(--muted);
      background: rgba(255, 255, 255, .1);
      border-radius: 999px;
      padding: 5px 10px;
    }

    .card-title {
      font-size: clamp(1.2rem, 2.8vw, 1.45rem);
      font-weight: 900;
      margin: 0;
      line-height: 1.15;
    }

    .card-description {
      font-size: .95rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.45;
      flex: 1;
    }

    .card-action {
      margin-top: 8px;
      font-size: .92rem;
      font-weight: 800;
      color: var(--accent);
    }

    .empty {
      margin: 0;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .08);
      border: 1px dashed rgba(255, 255, 255, .22);
      color: var(--muted);
      font-size: .95rem;
    }

    footer {
      margin-top: clamp(40px, 6vw, 64px);
      text-align: center;
      font-size: .88rem;
      color: var(--muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">🔒</div>

        <div>
          <h1>Studio</h1>
          <p class="subtitle">Hurtig adgang til dine øvelser og spil. Denne side er ikke linket fra forsiden.</p>
        </div>
      </div>
    </header>

    <section aria-labelledby="exercises-heading">
      <h2 class="section-title" id="exercises-heading">Øvelser</h2>

      <ul class="cards" id="exercise-list"></ul>
    </section>

    <section aria-labelledby="games-heading">
      <h2 class="section-title" id="games-heading">Spil</h2>

      <ul class="cards" id="game-list"></ul>
    </section>

    <footer>
      <p><a href="index.html">Offentlig forside</a></p>
    </footer>
  </div>

  <script>
    const exercises = [
      {
        href: "exercises/puls-3-dialog-09-sheng-memorization.html",
        icon: "💬",
        tag: "PULS · Præsentation 1",
        title: "Dialog 9 · Sheng",
        description: "Memorér dialogen: lyt, gentag, skjul dele og øv hele teksten med dansk lyd.",
        action: "Åbn øvelse →"
      },
      {
        href: "exercises/praes-1-11-build-up-tts.html",
        icon: "📝",
        tag: "PVTD · PRÆS 1-11",
        title: "3.1 Præs. · Build-up",
        description: "Lav korrekte spørgsmål og sætninger. Grøn/blå tekst viser modelanswers med dansk lyd.",
        action: "Åbn øvelse →"
      }
    ];

    const games = [
      {
        href: "games/taljagten-dansk-talspil.html",
        icon: "🎧",
        tag: "Talspil",
        title: "Taljagten",
        description: "Lyt til tallet på dansk, og vælg det rigtige kort. 20 runder med point og tid.",
        action: "Åbn spil →"
      }
    ];

    function renderCards(items, containerId, emptyMessage) {
      const container = document.getElementById(containerId);

      if (!items.length) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = emptyMessage;
        container.replaceWith(empty);
        return;
      }

      container.innerHTML = items.map((item) => `
        <li>
          <a class="card-link" href="${item.href}">
            <div class="card-icon" aria-hidden="true">${item.icon}</div>

            <div class="card-body">
              <span class="card-tag">${item.tag}</span>
              <h3 class="card-title">${item.title}</h3>
              <p class="card-description">${item.description}</p>
              <span class="card-action">${item.action}</span>
            </div>
          </a>
        </li>
      `).join("");
    }

    renderCards(exercises, "exercise-list", "Ingen øvelser endnu.");
    renderCards(games, "game-list", "Ingen spil endnu.");
  </script>
</body>
</html>
